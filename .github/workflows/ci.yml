name: OfflinePay CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Code Quality and Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: offlinepay_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true

    - name: Verify Dependencies
      run: go mod download

    - name: Run Formatting Check (gofmt)
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "The following files are not formatted correctly:"
          gofmt -l .
          exit 1
        fi

    - name: Run Static Analysis (go vet)
      run: go vet ./...

    - name: Run Test Suite with Coverage
      env:
        APP_ENV: testing
        DATABASE_URL: postgres://postgres:root@localhost:5432/offlinepay_test?sslmode=disable
        REDIS_ADDR: localhost:6379
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

    - name: Run Benchmark Smoke Test
      env:
        APP_ENV: testing
        DATABASE_URL: postgres://postgres:root@localhost:5432/offlinepay_test?sslmode=disable
        REDIS_ADDR: localhost:6379
      run: go test -v -run=^$ -bench=. -benchtime=10ms ./...

    - name: Verify compilation builds
      run: |
        mkdir -p bin
        go build -o bin/offlinepay-server cmd/server/main.go
        go build -o bin/offlinepay-simulation cmd/simulation/main.go
        go build -o bin/offlinepay-seed cmd/seed/main.go
