server:
  port: "8080"
  env: "development"

database:
  url: "postgres://postgres:root@localhost:5432/offlinepay?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"

redis:
  addr: "localhost:6379"
  password: ""

observability:
  tracing:
    enabled: true
    collector_url: "localhost:4317"
    service_name: "offlinepay-settlement-service"
  metrics:
    port: "9090"

security:
  bank_private_key: ""
  bank_public_key: ""
  rate_limits:
    anonymous: 20
    authenticated: 100
    internal: 1000
